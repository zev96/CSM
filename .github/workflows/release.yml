name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# softprops/action-gh-release needs contents:write to create the Release.
# The default GITHUB_TOKEN no longer has this permission since GitHub's
# 2023 security tightening — declare it explicitly here.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Rust toolchain is pre-installed on windows-latest, but add the MSVC
      # target defensively so `tauri build` doesn't fail if GitHub ever
      # changes the runner image.
      - name: Ensure Rust MSVC target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Verify tag matches canonical version
        run: python scripts/release_check.py "${{ github.ref_name }}"

      - name: Install Python deps (sidecar + csm_core editable)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install -e ./sidecar

      - name: Inject PAT into _token.py
        shell: pwsh
        # IMPORTANT: do NOT use a here-string here. YAML's `run: |` indents
        # the body, but PowerShell here-string terminator `"@` MUST be at
        # column 0 — indentation breaks it silently (file gets garbage).
        # Use a one-line Set-Content with a single-quoted literal instead.
        run: Set-Content -Path csm_core\updater_client\_token.py -Encoding utf8 -Value 'TOKEN = "${{ secrets.CSM_RELEASE_PAT }}"'

      - name: Verify _token.py was written correctly
        shell: pwsh
        run: |
          $size = (Get-Item csm_core\updater_client\_token.py).Length
          Write-Host "_token.py size: $size bytes"
          # Sanity: file should be > 30 bytes (TOKEN = "..." with a real PAT)
          # but < 200 bytes (a real PAT is ~93 chars). Don't print content.
          if ($size -lt 30) { Write-Error "TOKEN appears empty — check CSM_RELEASE_PAT secret"; exit 1 }
          if ($size -gt 200) { Write-Warning "TOKEN looks unusually long ($size bytes)" }

      # ── PyInstaller onefile artifacts that get bundled into Tauri ─────
      # build_sidecar.py drops the exe under frontend/src-tauri/binaries/
      # with the Tauri host-triple suffix (csm-sidecar-x86_64-pc-windows-msvc.exe).
      # build_updater.py drops updater.exe in the same dir as a Tauri resource.
      - name: Build sidecar (PyInstaller onefile)
        run: python scripts/build_sidecar.py --clean

      - name: Build updater (PyInstaller onefile)
        run: python scripts/build_updater.py --clean

      - name: Sanity check Tauri binaries dir
        shell: pwsh
        run: |
          $dir = "frontend/src-tauri/binaries"
          Get-ChildItem $dir | Format-Table -AutoSize
          if (-not (Test-Path "$dir/csm-sidecar-x86_64-pc-windows-msvc.exe")) {
            Write-Error "sidecar binary missing — build_sidecar.py output mismatch?"; exit 1
          }
          if (-not (Test-Path "$dir/updater.exe")) {
            Write-Error "updater.exe missing — build_updater.py output mismatch?"; exit 1
          }

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # tauri build produces both the NSIS installer .exe and the raw
      # release files (target/release/CSM.exe + WebView2Loader.dll +
      # binaries/ + resources/).
      - name: Build Tauri (NSIS bundle + raw release files)
        working-directory: frontend
        run: npm run tauri:build

      # Install the NSIS .exe silently to a staging dir, then zip that dir.
      # This guarantees the hot-update zip's layout == what a real
      # NSIS-installed copy looks like, so updater.exe's atomic-rename
      # logic doesn't trip over a path mismatch.
      #
      # NSIS `/S` is silent, `/D=` MUST be the last argument and unquoted
      # (those are NSIS rules; the wrapper accepts both spaces and not).
      - name: Stage NSIS install into D:\stage\CSM
        shell: pwsh
        run: |
          $nsis = Get-ChildItem `
            "frontend/src-tauri/target/release/bundle/nsis/CSM_*_x64-setup.exe" `
            | Select-Object -First 1
          if (-not $nsis) { Write-Error "NSIS installer not found"; exit 1 }
          Write-Host "Using installer: $($nsis.FullName)"
          $stage = "D:\stage\CSM"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # Run synchronously and wait for exit. Start-Process avoids the
          # shell silently backgrounding setup.exe (NSIS detaches by default).
          $p = Start-Process -FilePath $nsis.FullName -ArgumentList "/S","/D=$stage" -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            Write-Error "NSIS installer exited $($p.ExitCode)"; exit 1
          }
          Write-Host "── Staged contents:"
          Get-ChildItem $stage -Recurse | Select-Object FullName | Format-Table -AutoSize
          # 主 exe 的实际文件名来自 Cargo [[bin]].name (csm-tauri) 而非
          # tauri.conf.json 的 productName "CSM"。这是 v0.4.1 release CI
          # 第三跑摸出来的真实 NSIS 布局，跟我们最初的设计假设不一致。
          if (-not (Test-Path "$stage\csm-tauri.exe")) {
            Write-Error "Staging missing csm-tauri.exe — NSIS install failed silently?"; exit 1
          }
          if (-not (Test-Path "$stage\binaries\updater.exe")) {
            Write-Error "Staging missing binaries\updater.exe — Tauri resources 未写入"; exit 1
          }

      - name: Package hot-update zip
        shell: pwsh
        run: |
          # The zip's top-level dir must be "CSM" so updater.py finds a
          # single top-level entry and treats it as the new install root.
          Compress-Archive -Path "D:\stage\CSM" -DestinationPath "CSM-${{ github.ref_name }}.zip" -Force
          $size = (Get-Item "CSM-${{ github.ref_name }}.zip").Length
          Write-Host "zip size: $($size / 1MB | ForEach-Object { '{0:N1}' -f $_ }) MB"

      - name: Generate manifest.json
        run: python scripts/build_manifest.py --version "${{ github.ref_name }}" --zip "CSM-${{ github.ref_name }}.zip" --out manifest.json

      - name: Extract CHANGELOG section
        id: changelog
        shell: pwsh
        run: |
          $body = python scripts/extract_changelog.py "${{ github.ref_name }}"
          $body = $body -replace "`r`n", "`n"
          $delim = "EOF_$(Get-Random)"
          "body<<$delim" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "$body"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "$delim"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Find the NSIS .exe again (its filename includes the version) for the
      # release files list.
      - name: Locate NSIS installer for upload
        id: nsis
        shell: pwsh
        run: |
          $nsis = Get-ChildItem `
            "frontend/src-tauri/target/release/bundle/nsis/CSM_*_x64-setup.exe" `
            | Select-Object -First 1
          "path=$($nsis.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            CSM-${{ github.ref_name }}.zip
            manifest.json
            ${{ steps.nsis.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
