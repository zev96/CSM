<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- 空 favicon —— Tauri 桌面应用的窗口图标走 tauri.conf 的 bundle.icon，
         浏览器在 dev 时会自动请求 /favicon.ico，没占位就 404 噪音不停。 -->
    <link rel="icon" href="data:," />
    <title>CSM · Content SEO Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-density="cozy" data-radius="medium">
    <script>
      // FOUC 防闪：首屏渲染前依据已存偏好 / 系统设置写 data-theme。
      // 与 useTweaks 的 csm.tweaks.v1 同源；useTweaks 挂载后会再 apply 一次（幂等）。
      (function () {
        try {
          var pref = "system";
          // key must match STORAGE_KEY in src/composables/useTweaks.ts
          var raw = localStorage.getItem("csm.tweaks.v1");
          if (raw) { var p = JSON.parse(raw); if (p && p.theme) pref = p.theme; }
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.body.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.body.dataset.theme = "light";
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
